<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillForge — Демо прототип</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231A6B4A'/%3E%3Cpath d='M16 6.5 L21.5 16.5 L17.5 14.8 L17.5 19 L14.5 19 L14.5 14.8 L10.5 16.5 Z' fill='%23fff'/%3E%3Crect x='9' y='21' width='14' height='2.2' rx='1' fill='%2386EFBF'/%3E%3Crect x='12.5' y='23.2' width='7' height='2.6' rx='0.5' fill='%2386EFBF'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Epilogue:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F7F5F0;
  --white:     #FFFFFF;
  --surface:   #EFEDE8;
  --surface2:  #E8E5DF;
  --border:    #DDD9D0;
  --border2:   #C8C3B8;
  --text:      #1A1814;
  --muted:     #6B6760;
  --muted2:    #9A9590;
  --accent:    #1A6B4A;
  --accent-lt: #EAF4EE;
  --accent-md: #C6E8D4;
  --accent-dk: #145438;
  --amber:     #B85A00;
  --amber-lt:  #FEF3E8;
  --blue:      #2952B8;
  --blue-lt:   #EAF0FE;
  --red:       #C0392B;
  --red-lt:    #FDECEA;
  --ink:       #1A1814;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Epilogue', sans-serif;
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
}

button { font-family: inherit; }
input, textarea, select { font-family: inherit; }
a { color: var(--accent); text-decoration: none; }

/* ── DEMO BANNER ── */
.demo-banner {
  position: fixed; bottom: 20px; right: 20px; z-index: 200;
  background: var(--ink); color: #fff;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 12px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  max-width: 320px;
}
.demo-banner .dot {
  width: 8px; height: 8px;
  background: #86EFBF;
  border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.demo-banner b { color: #86EFBF; font-weight: 600; }
.demo-banner a { color: #86EFBF; text-decoration: underline; }
.demo-banner .reset-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 4px 10px; border-radius: 6px;
  font-size: 11px; cursor: pointer;
  margin-left: 6px;
}
.demo-banner .reset-btn:hover { background: rgba(255,255,255,0.2); }

/* ── BRAND LOGO ── */
.brand-logo {
  display: inline-flex; align-items: center; gap: 10px;
  text-decoration: none;
  font-family: 'Playfair Display', serif;
  font-size: 19px; font-weight: 800;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1;
}
.brand-logo .mark { width: 28px; height: 28px; display: block; border-radius: 7px; box-shadow: 0 2px 8px rgba(26,107,74,0.25); }
.brand-logo em { font-style: italic; color: var(--accent); font-weight: 800; }
.brand-logo.dark { color: #fff; }
.brand-logo.dark em { color: #86EFBF; }
.brand-logo.sm { font-size: 16px; }
.brand-logo.sm .mark { width: 24px; height: 24px; }

/* ═══════════ AUTH LAYOUT ═══════════ */
.auth-screen {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.auth-side {
  background: var(--ink);
  color: #fff;
  padding: 48px 56px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.auth-side::before {
  content: '';
  position: absolute;
  top: -150px; right: -150px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(26,107,74,0.25) 0%, transparent 70%);
}
.auth-side-content {
  margin-top: auto; position: relative; z-index: 1;
  max-width: 480px;
}
.auth-side-content h2 {
  font-family: 'Playfair Display', serif;
  font-size: 38px; font-weight: 800;
  line-height: 1.1; margin-bottom: 18px;
  letter-spacing: -0.02em;
}
.auth-side-content h2 em { font-style: italic; color: #86EFBF; }
.auth-side-content p {
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  line-height: 1.6;
  margin-bottom: 36px;
}
.auth-side-quote {
  border-left: 2px solid #86EFBF;
  padding-left: 18px;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  font-style: italic;
  margin-bottom: 14px;
  line-height: 1.6;
}
.auth-side-quote-meta { font-size: 12px; color: rgba(255,255,255,0.4); padding-left: 20px; }

.auth-main {
  padding: 48px 56px;
  display: flex; flex-direction: column;
  justify-content: center;
  position: relative;
}
.auth-form-wrap {
  max-width: 380px; width: 100%;
  margin: 0 auto;
}
.auth-form-wrap h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  color: var(--ink);
}
.auth-form-wrap .auth-sub {
  font-size: 14px; color: var(--muted);
  margin-bottom: 32px;
}
.auth-form-wrap .auth-sub a { font-weight: 500; }
.auth-form-wrap .auth-bottom {
  text-align: center; margin-top: 24px;
  font-size: 13px; color: var(--muted);
}

/* form basics */
.fg { margin-bottom: 16px; }
label { display: block; font-size: 12.5px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
label .req { color: var(--accent); }
input[type=text], input[type=email], input[type=password], input[type=tel], input[type=number], textarea, select {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 11px 13px;
  font-size: 14px; color: var(--text);
  outline: none;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(26,107,74,0.1);
}
input::placeholder, textarea::placeholder { color: var(--muted2); }
textarea { resize: vertical; min-height: 80px; }

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 11px 22px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--accent-dk); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,107,74,0.2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn.full { width: 100%; padding: 13px; }
.btn.sm { padding: 7px 14px; font-size: 13px; }
.btn.ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn.ghost:hover { background: var(--surface); border-color: var(--border2); }
.btn.danger { background: var(--red); }
.btn.danger:hover { background: #9a2c20; }
.btn.icon { padding: 7px; width: 32px; height: 32px; }

.help-link {
  font-size: 12.5px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

/* ═══════════ APP SHELL ═══════════ */
.app-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 22px 16px;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar-logo { padding: 0 8px 22px; }
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
.sidebar-link {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  color: var(--muted);
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
}
.sidebar-link:hover { background: var(--surface); color: var(--text); }
.sidebar-link.active { background: var(--accent-lt); color: var(--accent); font-weight: 600; }
.sidebar-link svg { flex-shrink: 0; width: 18px; height: 18px; }

.sidebar-divider { margin: 16px 0 8px; padding: 0 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted2); font-weight: 700; }

.sidebar-bottom {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding-top: 16px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  padding: 16px 12px 0;
}
.user-avatar {
  width: 32px; height: 32px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.user-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
.user-email { font-size: 11px; color: var(--muted2); line-height: 1.2; }

.app-main {
  padding: 32px 40px;
  max-width: 100%;
  overflow-x: hidden;
}

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
}
.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--ink);
  line-height: 1.2;
}
.page-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }

/* ── DASHBOARD ── */
.dash-tools {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.search-box {
  flex: 1; max-width: 420px;
  position: relative;
}
.search-box input {
  padding-left: 38px;
  background: var(--white);
}
.search-box svg {
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted2);
}

.proj-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}
.proj-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  display: flex; flex-direction: column;
  gap: 10px;
  min-height: 180px;
}
.proj-card:hover { border-color: var(--accent-md); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,24,20,0.06); }
.proj-card-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px;
}
.proj-icon {
  width: 36px; height: 36px;
  background: var(--accent-lt);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.status-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.status-tag.draft     { background: var(--amber-lt); color: var(--amber); }
.status-tag.exported  { background: var(--accent-lt); color: var(--accent); }
.status-tag.generating{ background: var(--blue-lt);  color: var(--blue); }
.status-tag.error     { background: var(--red-lt);   color: var(--red); }

.proj-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  color: var(--ink);
  line-height: 1.3;
}
.proj-file {
  font-size: 12px; color: var(--muted2);
  display: flex; align-items: center; gap: 5px;
}
.proj-meta {
  font-size: 12px; color: var(--muted);
  display: flex; gap: 12px;
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px dashed var(--border);
}

/* new project card */
.proj-card.new {
  background: var(--surface);
  border-style: dashed;
  border-color: var(--border2);
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--muted);
  min-height: 180px;
}
.proj-card.new:hover { background: var(--accent-lt); border-color: var(--accent-md); color: var(--accent); }
.proj-card.new .plus { font-size: 36px; font-weight: 300; line-height: 1; margin-bottom: 6px; }
.proj-card.new .label { font-size: 14px; font-weight: 600; }

/* empty state */
.empty-state {
  background: var(--white);
  border: 1px dashed var(--border2);
  border-radius: 16px;
  padding: 80px 40px;
  text-align: center;
}
.empty-illu { font-size: 64px; margin-bottom: 16px; }
.empty-state h2 {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 800;
  color: var(--ink); margin-bottom: 8px;
}
.empty-state p { font-size: 14px; color: var(--muted); margin-bottom: 24px; max-width: 360px; margin-left: auto; margin-right: auto; }

/* ═══════════ WIZARD ═══════════ */
.wizard-shell {
  min-height: 100vh;
  background: var(--bg);
  display: flex; flex-direction: column;
}
.wizard-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.wizard-steps {
  display: flex; align-items: center; gap: 12px;
}
.w-step {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted2);
  font-weight: 500;
}
.w-step-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: var(--muted2);
}
.w-step.active .w-step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
.w-step.active { color: var(--text); font-weight: 600; }
.w-step.done .w-step-num { background: var(--accent-lt); border-color: var(--accent-md); color: var(--accent); }
.w-step.done { color: var(--accent); }
.w-step-line {
  width: 28px; height: 1.5px;
  background: var(--border);
}
.w-step.done + .w-step-line { background: var(--accent-md); }

.wizard-body {
  flex: 1;
  padding: 60px 40px;
  display: flex; align-items: flex-start; justify-content: center;
}
.wizard-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 48px;
  max-width: 720px; width: 100%;
}
.wizard-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.01em;
  margin-bottom: 8px;
}
.wizard-card .wcard-sub {
  font-size: 14px; color: var(--muted);
  margin-bottom: 32px;
}

/* dropzone */
.dropzone {
  border: 2px dashed var(--border2);
  border-radius: 14px;
  padding: 56px 24px;
  text-align: center;
  cursor: pointer;
  background: var(--surface);
  transition: all 0.2s;
}
.dropzone:hover, .dropzone.drag {
  border-color: var(--accent);
  background: var(--accent-lt);
}
.dropzone-icon { font-size: 40px; margin-bottom: 12px; display: block; }
.dropzone h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  margin-bottom: 6px;
  color: var(--ink);
}
.dropzone p { font-size: 13px; color: var(--muted); }
.dropzone .formats {
  display: inline-flex; gap: 6px;
  margin-top: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.dropzone .formats span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: var(--white);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 4px;
  color: var(--muted);
}

/* parse progress */
.parse-progress {
  background: var(--surface);
  border-radius: 12px;
  padding: 24px;
  display: flex; align-items: center; gap: 16px;
}
.parse-icon {
  width: 44px; height: 44px;
  background: var(--accent-lt);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.parse-info { flex: 1; min-width: 0; }
.parse-file { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.parse-status { font-size: 12px; color: var(--muted); margin-top: 3px; }
.parse-bar { background: var(--border); height: 4px; border-radius: 2px; overflow: hidden; margin-top: 10px; }
.parse-bar-fill { height: 100%; background: var(--accent); width: 0; transition: width 0.3s; }

/* params form */
.radio-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.radio-card {
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  text-align: center;
  background: var(--white);
  transition: all 0.15s;
}
.radio-card:hover { border-color: var(--border2); background: var(--surface); }
.radio-card.selected { border-color: var(--accent); background: var(--accent-lt); }
.radio-card-title { font-weight: 600; font-size: 14px; color: var(--text); }
.radio-card-desc { font-size: 11px; color: var(--muted2); margin-top: 3px; }

.range-row { padding: 4px 0; }
.range-row .range-label {
  display: flex; justify-content: space-between;
  font-size: 12.5px; color: var(--muted);
  margin-bottom: 8px;
}
.range-row .range-label b {
  color: var(--accent); font-weight: 700;
  font-family: 'Playfair Display', serif; font-size: 15px;
}
input[type=range] {
  width: 100%; height: 4px;
  background: var(--border); border-radius: 2px;
  appearance: none; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  appearance: none; width: 18px; height: 18px;
  background: var(--accent); border-radius: 50%;
  box-shadow: 0 2px 6px rgba(26,107,74,0.3);
  border: 2px solid #fff;
}

.wizard-footer {
  display: flex; justify-content: space-between;
  margin-top: 36px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}

/* generation progress */
.gen-progress { padding: 24px 0; }
.gen-overall {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 28px;
}
.gen-spinner {
  width: 56px; height: 56px;
  border: 4px solid var(--accent-lt);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.gen-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: var(--ink);
}
.gen-eta { font-size: 13px; color: var(--muted); margin-top: 3px; }

.gen-bar {
  background: var(--border);
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 28px;
}
.gen-bar-fill { height: 100%; background: var(--accent); width: 0; transition: width 0.6s; }

.gen-steps { display: flex; flex-direction: column; gap: 8px; }
.gen-step {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border-radius: 10px;
  font-size: 13.5px;
  color: var(--muted);
  transition: all 0.3s;
}
.gen-step.active { background: var(--accent-lt); color: var(--accent); font-weight: 600; }
.gen-step.done { background: var(--white); color: var(--text); }
.gen-step-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--border);
  color: var(--muted2);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.gen-step.active .gen-step-icon {
  background: var(--accent);
  color: #fff;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.gen-step.done .gen-step-icon { background: var(--accent); color: #fff; }

/* ═══════════ EDITOR ═══════════ */
.editor-shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 64px 1fr;
}
.editor-topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.editor-top-left {
  display: flex; align-items: center; gap: 14px;
  flex: 1; min-width: 0;

const LS_KEY = 'skillforge_demo_state_v1';

let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem(LS_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    auth: false,
    user: null,
    projects: JSON.parse(JSON.stringify(SEED_PROJECTS)),
    wizardDraft: null
  };
}
function saveState() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function resetDemo() {
  if (!confirm('Сбросить все демо-данные?')) return;
  localStorage.removeItem(LS_KEY);
  state = loadState();
  navigate('/login');
}

/* ═══════════════════════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════════════════════ */
const routes = {};
function registerRoute(pattern, fn) { routes[pattern] = fn; }
function navigate(path) { location.hash = '#' + path; }
function currentPath() {
  const h = location.hash.replace(/^#/, '');
  return h || '/login';
}
function matchRoute(path) {
  for (const pat of Object.keys(routes)) {
    const re = new RegExp('^' + pat.replace(/:[a-z]+/g, '([^/]+)') + '$');
    const m = path.match(re);
    if (m) {
      const keys = (pat.match(/:[a-z]+/g) || []).map(k => k.slice(1));
      const params = {};
      keys.forEach((k, i) => params[k] = m[i+1]);
      return { fn: routes[pat], params };
    }
  }
  return null;
}
function render() {
  const path = currentPath();
  const r = matchRoute(path);
  const app = document.getElementById('app');
  closeModal();
  if (r) {
    app.innerHTML = r.fn(r.params);
    if (r.fn.onMount) r.fn.onMount(r.params);
  } else {
    app.innerHTML = `<div class="auth-screen"><div class="auth-main"><div class="auth-form-wrap"><h1>404</h1><p class="auth-sub">Страница не найдена</p><a href="#/login" class="btn">На главную</a></div></div></div>`;
  }
  // gate: require auth except auth pages
  const publicPaths = ['/login','/register','/forgot','/reset'];
  if (!state.auth && !publicPaths.includes(path) && !path.startsWith('/reset')) {
    navigate('/login');
  }
}
window.addEventListener('hashchange', render);

  return `

function filterProjects(q) {
  const filtered = state.projects.filter(p => p.title.toLowerCase().includes(q.toLowerCase()));

    ? `<div class="empty-state" style="padding:60px 24px"><h2 style="font-size:18px">Ничего не найдено</h2><p>Попробуйте изменить запрос</p></div>`
    : `<div class="proj-grid"><a href="#/projects/new" class="proj-card new"><div class="plus">+</div><div class="label">Новый курс</div></a>${filtered.map(p => projectCard(p)).join('')}</div>`;

}

routes['/projects/:id/generating'].onMount = ({ id }) => {
  const steps = ['Анализ структуры и определение модулей','Модуль 1: «Основы охраны труда»','Модуль 2: «Производственный травматизм»','Модуль 3: «Пожарная безопасность»','Сборка итогового теста','Готово!'];
  let i = 1;
  const tick = () => {
    const allSteps = document.querySelectorAll('#gen-steps .gen-step');
    if (!allSteps.length) return;
    if (i >= 6) {
      // Done
      const p = state.projects.find(x => x.id === id);
      if (p) {
        p.status = 'draft';
        p.content = JSON.parse(JSON.stringify(SAMPLE_COURSE));
        p.updatedAt = new Date().toISOString();
        saveState();
      }
      navigate('/projects/' + id + '/edit');
      return;
    }
    allSteps.forEach((el, idx) => {
      el.classList.remove('active','done');
      if (idx < i) {
        el.classList.add('done');
        el.querySelector('.gen-step-icon').textContent = '✓';
      } else if (idx === i) {
        el.classList.add('active');
      }
    });
    const title = document.getElementById('gen-title');
    const eta = document.getElementById('gen-eta');
    const bar = document.getElementById('gen-bar');
    if (title) title.textContent = steps[i-1] + '...';
    if (eta) eta.textContent = `Осталось ≈ ${Math.max(0, 5 - i)} мин`;
    if (bar) bar.style.width = Math.round((i / 6) * 100) + '%';
    i++;
    setTimeout(tick, 1800);
  };
  setTimeout(tick, 1500);
};

function renderEditor(p) {
  const c = p.content;
  return `
    <div class="editor-shell">
      <header class="editor-topbar">
        <div class="editor-top-left">
          <a href="#/projects" class="editor-back" title="К списку курсов">

          <span class="save-status"><span class="dot"></span> Сохранено только что</span>
        </div>
        <div class="editor-top-right">
          <div class="editor-tabs">
            <button class="editor-tab ${editorState.view!=='test'?'active':''}" onclick="setEditorView('slide')">
              <svg width="14" height="14"><use href="#i-folder"/></svg> Курс
            </button>
            <button class="editor-tab ${editorState.view==='test'?'active':''}" onclick="setEditorView('test')">
              📝 Тест
            </button>
          </div>
          <button class="btn ghost sm" onclick="openSlidePreview('${p.id}')">
            <svg width="14" height="14"><use href="#i-eye"/></svg> Превью
          </button>
          <button class="btn sm" onclick="openExport('${p.id}')">
            <svg width="14" height="14"><use href="#i-download"/></svg> Экспорт
          </button>
        </div>
      </header>

      <div class="editor-body">
        <aside class="editor-tree">
          <div class="tree-section-title">
            <span>Структура курса</span>
            <button class="tree-add-btn" title="Добавить модуль" onclick="addModule('${p.id}')">+</button>
          </div>
          ${c.modules.map((m, mi) => renderTreeModule(m, mi+1)).join('')}
          <div class="tree-test-link ${editorState.view==='test'?'active':''}" onclick="setEditorView('test')">
            📝 Итоговый тест
            <span style="margin-left:auto;font-size:11px;color:var(--muted2);font-weight:500">${countQuestions(c)} вопр.</span>
          </div>
        </aside>

        <section class="editor-content" id="ed-content">
          ${editorState.view === 'test' ? renderTestEditor(p) : renderSlideEditor(p)}
        </section>
      </div>
    </div>
  `;
}

function renderTreeModule(m, num) {
  const slides = m.slides.map(s => `
    <div class="tree-slide ${editorState.activeSlideId===s.id?'active':''}" onclick="selectSlide('${s.id}')">
      <span class="slide-icon">▢</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(s.title)}</span>
    </div>
  `).join('');
  return `
    <div class="tree-module">
      <div class="tree-mod-head">
        <span class="drag-handle"><svg width="12" height="12"><use href="#i-drag"/></svg></span>
        <span class="chev">▾</span>
        <span class="mod-num">${num}</span>
        <span class="mod-title">${escapeHtml(m.title)}</span>
      </div>
      <div class="tree-mod-children">
        ${slides}
        <div class="tree-slide" onclick="selectModuleQuestions('${m.id}')" style="color:var(--accent)">
          <span class="slide-icon">?</span>
          <span>Вопросы модуля (${m.questions.length})</span>
        </div>
      </div>
    </div>
  `;
}

function findSlide(p, slideId) {
  for (const m of p.content.modules) {
    const s = m.slides.find(x => x.id === slideId);
    if (s) return { module: m, slide: s };
  }
  return null;
}

function renderSlideEditor(p) {
  if (editorState.view === 'module-questions') {
    const m = p.content.modules.find(x => x.id === editorState.activeModuleId);
    if (!m) return '';
    return `
      <div class="module-questions-block" style="margin-top:0">
        <div class="mqb-title">📝 Вопросы модуля «${escapeHtml(m.title)}»</div>
        <div class="mqb-sub">Эти вопросы проверяют знания по конкретному модулю. Также войдут в итоговый тест.</div>
        ${m.questions.map((q, i) => renderQuestionCard(q, i+1, p.id, m.id)).join('')}
        <button class="btn ghost sm" onclick="alert('Демо: добавление вопроса')" style="margin-top:8px">
          <svg width="12" height="12"><use href="#i-plus"/></svg> Добавить вопрос
        </button>
      </div>
    `;
  }
  const found = findSlide(p, editorState.activeSlideId);
  if (!found) return '<div>Слайд не найден</div>';
  const { module: m, slide: s } = found;
  const slideIdx = m.slides.findIndex(x => x.id === s.id);
  return `
    <div class="slide-edit-wrap">
      <div class="slide-edit-head">
        <span class="slide-num-tag">МОДУЛЬ ${state.projects.find(x=>x.id===p.id).content.modules.findIndex(x=>x.id===m.id)+1} · СЛАЙД ${slideIdx+1}</span>
      </div>
      <input type="text" class="slide-title-input" id="slide-title" value="${escapeAttr(s.title)}" oninput="updateSlide('${p.id}', '${s.id}', 'title', this.value)">

      <div style="margin-top:18px">
        <div class="rich-toolbar">
          <button class="rich-btn" onclick="doRich('bold')" title="Жирный"><b>B</b></button>
          <button class="rich-btn" onclick="doRich('italic')" title="Курсив"><i>I</i></button>
          <button class="rich-btn" onclick="doRich('underline')" title="Подчёркнутый"><u>U</u></button>
          <div class="rich-divider"></div>
          <button class="rich-btn" onclick="doRich('insertUnorderedList')" title="Список">•</button>
          <button class="rich-btn" onclick="doRich('insertOrderedList')" title="Нумерованный">1.</button>
          <div class="rich-divider"></div>
          <button class="rich-btn" onclick="doRich('formatBlock','H3')" title="Подзаголовок">H</button>
          <button class="rich-btn" onclick="doRich('removeFormat')" title="Очистить">✕</button>
        </div>
        <div class="rich-editor" contenteditable="true" id="slide-content" oninput="updateSlide('${p.id}', '${s.id}', 'content', this.innerHTML)">${s.content}</div>
      </div>

      <div class="slide-actions">
        <button class="btn ghost sm" onclick="regenerateSlide('${s.id}')">
          <svg width="14" height="14"><use href="#i-refresh"/></svg> Регенерировать слайд
        </button>
        <button class="btn ghost sm" onclick="openSlidePreview('${p.id}','${s.id}')">
          <svg width="14" height="14"><use href="#i-eye"/></svg> Превью
        </button>
        <button class="btn ghost sm" onclick="addSlide('${p.id}', '${m.id}')">
          <svg width="14" height="14"><use href="#i-plus"/></svg> Добавить слайд
        </button>
        <button class="btn ghost sm" onclick="deleteSlide('${p.id}', '${s.id}')" style="color:var(--red)">
          <svg width="14" height="14"><use href="#i-trash"/></svg> Удалить
        </button>
      </div>

      <div class="slide-meta">
        <div class="slide-meta-label">Цель модуля</div>
        <div class="slide-meta-text">${escapeHtml(m.objective)}</div>
      </div>
    </div>
  `;
}

function renderQuestionCard(q, num, pid, mid) {
  return `
    <div class="q-card">
      <div class="q-card-head">
        <span class="q-num">Q${String(num).padStart(2,'0')}</span>
        <input class="q-text" value="${escapeAttr(q.text)}" onchange="updateQuestion('${pid}','${q.id}','text',this.value)">
      </div>
      <div class="q-options">
        ${q.options.map((opt, i) => `
          <div class="q-option-row ${i===q.correct?'correct':''}" onclick="setCorrect('${pid}','${q.id}',${i})">
            <div class="q-option-radio"></div>
            <input class="q-option-text" value="${escapeAttr(opt)}" onclick="event.stopPropagation()" onchange="updateOption('${pid}','${q.id}',${i},this.value)">
          </div>
        `).join('')}
      </div>
      <div class="q-actions">
        <button class="btn ghost sm" onclick="alert('Демо: регенерация вопроса через AI')">
          <svg width="12" height="12"><use href="#i-refresh"/></svg> Регенерировать
        </button>
        <button class="btn ghost sm" onclick="alert('Демо: удаление вопроса')" style="color:var(--red)">
          <svg width="12" height="12"><use href="#i-trash"/></svg> Удалить
        </button>
      </div>
    </div>
  `;
}

function renderTestEditor(p) {
  const allQuestions = [];
  p.content.modules.forEach(m => m.questions.forEach(q => allQuestions.push({ q, m })));
  return `
    <div class="test-shell">
      <div class="test-meta-bar">
        <div class="test-meta-left">
          <h2>Итоговый тест</h2>
          <p>${allQuestions.length} ${pluralize(allQuestions.length,'вопрос','вопроса','вопросов')} · собран из всех модулей</p>
        </div>
        <div class="test-pass">
          <label>Проходной балл</label>
          <input type="number" min="0" max="100" value="${p.content.passScore || 70}" onchange="updatePassScore('${p.id}', this.value)">
          <span style="font-size:13px;color:var(--muted)">%</span>
        </div>
      </div>

      ${p.content.modules.map((m, mi) => `
        <div style="margin-bottom:24px">
          <div style="font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.08em;font-weight:700;margin-bottom:10px;padding-left:4px">
            Модуль ${mi+1} · ${escapeHtml(m.title)}
          </div>
          ${m.questions.map((q, qi) => renderQuestionCard(q, qi+1, p.id, m.id)).join('')}
        </div>
      `).join('')}

      <button class="btn ghost" onclick="alert('Демо: добавить вопрос вручную')">
        <svg width="14" height="14"><use href="#i-plus"/></svg> Добавить вопрос
      </button>
    </div>
  `;
}

/* editor actions */
function selectSlide(slideId) {
  editorState.activeSlideId = slideId;
  editorState.view = 'slide';
  rerenderEditorContent();
}
function selectModuleQuestions(modId) {
  editorState.activeModuleId = modId;
  editorState.view = 'module-questions';
  rerenderEditorContent();
}
function setEditorView(v) {
  editorState.view = v;
  rerenderEditorContent();
}
function rerenderEditorContent() {
  const id = currentPath().split('/')[2];
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('ed-content').innerHTML = editorState.view === 'test' ? renderTestEditor(p) : renderSlideEditor(p);
  // update tree active state
  document.querySelectorAll('.tree-slide').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.editor-tab').forEach(el => el.classList.toggle('active', (el.textContent.includes('Тест') && editorState.view==='test') || (el.textContent.includes('Курс') && editorState.view!=='test')));
  document.querySelectorAll('.tree-test-link').forEach(el => el.classList.toggle('active', editorState.view==='test'));
}
function onTitleChange(pid, val) {
  const p = state.projects.find(x => x.id === pid);
  if (p) { p.content.title = val; p.title = val; p.updatedAt = new Date().toISOString(); saveState(); }
}
function updateSlide(pid, sid, field, val) {
  const p = state.projects.find(x => x.id === pid);
  const found = findSlide(p, sid);
  if (found) { found.slide[field] = val; p.updatedAt = new Date().toISOString(); saveState(); }
}
function regenerateSlide(sid) {
  alert('Демо: AI регенерирует слайд за ~10 секунд. В реальном продукте — отдельный API-вызов с тем же контекстом.');
}
function addSlide(pid, mid) {
  const p = state.projects.find(x => x.id === pid);
  const m = p.content.modules.find(x => x.id === mid);
  const newSlide = { id: 's_' + Date.now(), title: 'Новый слайд', content: '<p>Введите текст слайда...</p>' };
  m.slides.push(newSlide);
  editorState.activeSlideId = newSlide.id;
  editorState.view = 'slide';
  saveState();
  const id = currentPath().split('/')[2];
  document.getElementById('app').innerHTML = renderEditor(p);
  attachEditorListeners(id);
}
function addModule(pid) {
  const p = state.projects.find(x => x.id === pid);
  p.content.modules.push({
    id: 'm_' + Date.now(),
    title: 'Новый модуль',
    objective: 'Цель модуля...',
    slides: [{ id: 's_' + Date.now(), title: 'Слайд 1', content: '<p>Введите текст...</p>' }],
    questions: []
  });
  saveState();
  const id = currentPath().split('/')[2];
  document.getElementById('app').innerHTML = renderEditor(p);
  attachEditorListeners(id);
}
function deleteSlide(pid, sid) {
  if (!confirm('Удалить слайд?')) return;
  const p = state.projects.find(x => x.id === pid);
  for (const m of p.content.modules) {
    const idx = m.slides.findIndex(s => s.id === sid);
    if (idx > -1) {
      m.slides.splice(idx, 1);
      editorState.activeSlideId = m.slides[0]?.id || p.content.modules[0].slides[0]?.id;
      saveState();
      const id = currentPath().split('/')[2];
      document.getElementById('app').innerHTML = renderEditor(p);
      attachEditorListeners(id);
      return;
    }
  }
}
function updateQuestion(pid, qid, field, val) {
  const p = state.projects.find(x => x.id === pid);
  for (const m of p.content.modules) {
    const q = m.questions.find(x => x.id === qid);
    if (q) { q[field] = val; saveState(); return; }
  }
}
function updateOption(pid, qid, idx, val) {
  const p = state.projects.find(x => x.id === pid);
  for (const m of p.content.modules) {
    const q = m.questions.find(x => x.id === qid);
    if (q) { q.options[idx] = val; saveState(); return; }
  }
}
function setCorrect(pid, qid, idx) {
  const p = state.projects.find(x => x.id === pid);
  for (const m of p.content.modules) {
    const q = m.questions.find(x => x.id === qid);
    if (q) {
      q.correct = idx;
      saveState();
      rerenderEditorContent();
      return;
    }
  }
}
function updatePassScore(pid, val) {
  const p = state.projects.find(x => x.id === pid);
  p.content.passScore = parseInt(val);
  saveState();
}
function doRich(cmd, val) {
  document.execCommand(cmd, false, val || null);
}
function attachEditorListeners(id) {
  // placeholder for future event delegation
}

/* ═══════════════════════════════════════════════════════════
   MODALS — Preview & Export
═══════════════════════════════════════════════════════════ */
function openModal(html) {
  document.getElementById('modal-root').innerHTML = html;
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function openSlidePreview(pid, sid) {
  const p = state.projects.find(x => x.id === pid);
  sid = sid || editorState.activeSlideId;
  const found = findSlide(p, sid);
  if (!found) return;
  const { module: m, slide: s } = found;
  const totalSlides = p.content.modules.reduce((a,mm) => a + mm.slides.length, 0);
  const allSlides = [];
  p.content.modules.forEach(mm => mm.slides.forEach(ss => allSlides.push({ slide: ss, module: mm })));
  const currentIdx = allSlides.findIndex(x => x.slide.id === sid);
  openModal(`
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal large">
        <div class="modal-head">
          <h3>Превью слайда · как увидит сотрудник в LMS</h3>
          <button class="modal-close" onclick="closeModal()"><svg width="20" height="20"><use href="#i-x"/></svg></button>
        </div>
        <div class="modal-body">
          <div class="preview-slide">
            <h1>${escapeHtml(s.title)}</h1>
            <div class="preview-slide-content">${s.content}</div>
            <div class="preview-slide-footer">${escapeHtml(m.title)} · Слайд ${currentIdx+1} из ${totalSlides}</div>
          </div>
          <div class="preview-nav">
            <button class="btn ghost sm" ${currentIdx===0?'disabled':''} onclick="openSlidePreview('${pid}','${allSlides[Math.max(0,currentIdx-1)]?.slide.id}')">
              <svg width="14" height="14"><use href="#i-arrow-left"/></svg> Предыдущий
            </button>
            <span style="font-size:12px;color:var(--muted)">${currentIdx+1} / ${totalSlides}</span>
            <button class="btn sm" ${currentIdx===totalSlides-1?'disabled':''} onclick="openSlidePreview('${pid}','${allSlides[Math.min(totalSlides-1,currentIdx+1)]?.slide.id}')">
              Следующий <svg width="14" height="14"><use href="#i-arrow-right"/></svg>
            </button>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn ghost" onclick="closeModal()">Закрыть</button>
        </div>
      </div>
    </div>
  `);
}

function openExport(pid) {
  const p = state.projects.find(x => x.id === pid);
  const modulesCount = p.content.modules.length;
  const slidesCount = p.content.modules.reduce((a,m) => a + m.slides.length, 0);
  const questionsCount = countQuestions(p.content);
  openModal(`
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h3>Экспорт курса</h3>
          <button class="modal-close" onclick="closeModal()"><svg width="20" height="20"><use href="#i-x"/></svg></button>
        </div>
        <div class="modal-body">
          <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Курс <b style="color:var(--text)">${escapeHtml(p.content.title)}</b> · ${modulesCount} модулей · ${slidesCount} слайдов · ${questionsCount} вопросов</p>

          <div class="export-options">
            <div class="export-opt" onclick="doExport('scorm','${pid}')">
              <div class="export-opt-icon">📦</div>
              <h4>SCORM 1.2</h4>
              <p>ZIP-архив для загрузки в LMS компании</p>
              <div class="file-info">course_${pid}.zip · ~2.4 МБ</div>
            </div>
            <div class="export-opt" onclick="doExport('xlsx','${pid}')">
              <div class="export-opt-icon">📊</div>
              <h4>Тест в XLSX</h4>
              <p>Таблица с вопросами и ответами для архива</p>
              <div class="file-info">test_${pid}.xlsx · ~24 КБ</div>
            </div>
          </div>

          <div class="lms-check-box">
            <b>Проверено в LMS:</b><br>
            Пакет SCORM 1.2 загружается без ошибок в:
            <div class="lms-icons">
              <span>Moodle 4.x</span><span>iSpring Learn</span><span>Эквио</span><span>WebSoft HCM</span>
            </div>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn ghost" onclick="closeModal()">Закрыть</button>
        </div>
      </div>
    </div>
  `);
}

function doExport(format, pid) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-body" style="text-align:center;padding:48px 32px">
          <div class="gen-spinner" style="margin:0 auto 20px"></div>
          <h3 style="font-family:'Playfair Display',serif;font-size:20px;font-weight:800;margin-bottom:8px">Собираем ${format === 'scorm' ? 'SCORM 1.2 пакет' : 'XLSX-таблицу'}...</h3>
          <p style="font-size:13px;color:var(--muted)">Это займёт около 20–30 секунд</p>
        </div>
      </div>

  setTimeout(() => {
    const p = state.projects.find(x => x.id === pid);

    root.innerHTML = `
      <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <div class="modal-body" style="text-align:center;padding:48px 32px">

              <svg width="32" height="32" style="color:var(--accent)"><use href="#i-check"/></svg>

            <h3 style="font-family:'Playfair Display',serif;font-size:22px;font-weight:800;margin-bottom:8px">Готово!</h3>
            <p style="font-size:13.5px;color:var(--muted);margin-bottom:24px">${format === 'scorm' ? 'SCORM 1.2 пакет' : 'XLSX-файл'} собран и сохранён в загрузки</p>
            <div style="background:var(--surface);border-radius:10px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:20px">
              ${format==='scorm' ? `course_${pid}.zip` : `test_${pid}.xlsx`}
            </div>
            <p style="font-size:12px;color:var(--muted2);margin-bottom:18px">Загрузите этот файл в вашу LMS — курс сразу станет доступен сотрудникам.</p>
            <button class="btn" onclick="closeModal(); render();">Готово</button>
          </div>
        </div>
      </div>
    `;
  }, 2200);
}

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m]));
}
function escapeAttr(s) { return escapeHtml(s); }
function pluralize(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
  return many;
}
function formatRelative(iso) {
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'только что';
  if (diff < 3600) { const m = Math.round(diff/60); return `${m} ${pluralize(m,'минуту','минуты','минут')} назад`; }
  if (diff < 86400) { const h = Math.round(diff/3600); return `${h} ${pluralize(h,'час','часа','часов')} назад`; }
  const days = Math.floor(diff/86400);
  if (days < 7) return `${days} ${pluralize(days,'день','дня','дней')} назад`;
  return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
}
function countQuestions(c) {
  return c.modules.reduce((a,m) => a + m.questions.length, 0);
}
